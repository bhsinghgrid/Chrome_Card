# Calendar MCP (Python) integration
# - Proxies `/mcp/**` + `/api/agent/**` to the Python FastAPI bridge (api_server.py)
# - Optionally auto-starts the Python server on Spring Boot startup

calendar.mcp.enabled=true
calendar.mcp.autostart=true
calendar.mcp.upstream-host=127.0.0.1
calendar.mcp.upstream-port=8001

# Optional (only needed if auto-detection fails)
# calendar.mcp.python-root-dir=/absolute/path/to/calender_MCP
# calendar.mcp.python-executable=/absolute/path/to/python

# Second MCP server (optional)
# - Proxies `/mcp2/**` to the second MCP upstream's `/mcp/**`
calendar.mcp2.enabled=false
calendar.mcp2.autostart=false
calendar.mcp2.upstream-host=127.0.0.1
calendar.mcp2.upstream-port=8002

# Optional (only needed if calendar.mcp2.autostart=true)
# calendar.mcp2.python-root-dir=/absolute/path/to/second_mcp_project
# calendar.mcp2.python-executable=/absolute/path/to/python
